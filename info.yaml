# Tiny Tapeout project information
project:
  title: "Tiny8 CPU with SPI program load and internal execution"
  author: "Luis Javier"
  discord: ""
  description: "8-bit CPU that loads 16-bit instructions over SPI into internal program memory and then executes them autonomously. Final stable version uses 10 instruction slots and an enriched ISA."
  language: "Verilog"
  clock_hz: 50000000
  tiles: "1x1"
  top_module: "tt_um_tiny8_risclike"

  source_files:
    - "alu8.v"
    - "tiny8_cpu.v"
    - "tiny8_prgmem.v"
    - "tiny8_spi_loader.v"
    - "tt_um_tiny8_risclike.v"

pinout:
  ui[0]: "RUN"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  uo[0]: "OUT[0]"
  uo[1]: "OUT[1]"
  uo[2]: "OUT[2]"
  uo[3]: "OUT[3]"
  uo[4]: "OUT[4]"
  uo[5]: "OUT[5]"
  uo[6]: "OUT[6]"
  uo[7]: "OUT[7]"

  uio[0]: "SPI_SCK input"
  uio[1]: "SPI_CS_N input"
  uio[2]: "SPI_MOSI input"
  uio[3]: "PROGRAM_LOADED output"
  uio[4]: "HALTED output"
  uio[5]: "RUN_ECHO output"
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
